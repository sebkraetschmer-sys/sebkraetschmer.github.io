<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stammtisch Pro</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5efe6;
      color: #1f1a17;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }
    h1 {
      font-size: 2.4rem;
      margin-bottom: 12px;
    }
    p {
      line-height: 1.6;
      font-size: 1.05rem;
    }
    .card {
      background: #fffaf4;
      border: 1px solid #e6d8c7;
      border-radius: 18px;
      padding: 20px;
      margin-top: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    a {
      color: #8b4513;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>Stammtisch Pro</h1>
    <p>Stammtisch Pro ist eine Würfelspiel-App mit klassischen Trink- und Kneipenspielen wie Schocken, Mäxchen und weiteren Spielmodi für den gemeinsamen Abend.</p>

    <div class="card">
      <h2>Kontakt</h2>
      <p>E-Mail: <a href="mailto:apps.kraetschmer@gmail.com">apps.kraetschmer@gmail.com</a></p>
    </div>

    <div class="card">
      <h2>Datenschutz</h2>
      <p>Die Datenschutzerklärung wird hier bereitgestellt.</p>
    </div>
  </main>
</body>
</html>
