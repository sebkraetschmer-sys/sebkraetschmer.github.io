<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pocket Apps Studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #f6f1e8;
  --bg2: #ebe4d8;

  --card: rgba(255,253,249,.78);

  --border: rgba(26,23,20,.08);
  --border2: rgba(26,23,20,.16);

  --text: #17130f;
  --muted: #74695f;

  --accent: #1f7a4d;
  --accent-dark: #17452f;
  --accent-light: #e5f3eb;

  --amber-light: #fff1db;
  --blue-light: #e7f0fa;
  --teal-light: #e2f4ef;
  --coral-light: #fdebe7;
  --purple-light: #eeeafb;
  --green-light: #e8f4e8;

  --shadow:
    0 10px 35px rgba(0,0,0,.05),
    0 25px 80px rgba(0,0,0,.08);

  --radius: 26px;

  --serif: 'DM Serif Display', serif;
  --sans: 'DM Sans', sans-serif;
}

body {
  font-family: var(--sans);

  background:
    radial-gradient(circle at top right, rgba(31,122,77,.18), transparent 30%),
    radial-gradient(circle at bottom left, rgba(184,100,10,.10), transparent 25%),
    linear-gradient(135deg,var(--bg),var(--bg2));

  color: var(--text);

  min-height: 100vh;
}

/* NAV */

.topbar {
  position: sticky;
  top: 0;
  z-index: 100;

  background: rgba(246,241,232,.72);

  backdrop-filter: blur(20px);

  border-bottom: 1px solid var(--border);

  padding: 0 2rem;
}

.topbar-inner {
  max-width: 1120px;
  margin: 0 auto;

  display: flex;
  align-items: center;
  justify-content: space-between;

  height: 70px;
}

.logo {
  font-family: var(--serif);

  font-size: 1.2rem;

  color: var(--text);

  text-decoration: none;

  cursor: pointer;

  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 34px !important;
  height: 34px !important;

  border-radius: 10px !important;

  margin-right: 0 !important;

  box-shadow: 0 10px 30px rgba(0,0,0,.08);
}

.logo span {
  color: var(--accent);
}

.topnav {
  display: flex;
  gap: 6px;

  background: rgba(255,255,255,.5);

  border: 1px solid var(--border);

  border-radius: 999px;

  padding: 5px;
}

.topnav-btn {
  padding: 9px 14px;

  font-size: 13px;

  font-family: var(--sans);
  font-weight: 500;

  color: var(--muted);

  background: transparent;

  border: none;

  border-radius: 999px;

  cursor: pointer;

  transition: .18s ease;
}

.topnav-btn:hover {
  color: var(--text);
  background: rgba(255,255,255,.8);
}

.topnav-btn.active {
  background: var(--text);
  color: white;
}

/* HERO */

.hero {
  max-width: 1120px;

  margin: 0 auto;

  padding:
    6rem
    2rem
    5rem;

  display: grid;
  grid-template-columns: 1.05fr .95fr;

  gap: 4rem;

  align-items: center;
}

.hero-label {
  display: inline-flex;

  align-items: center;

  gap: 8px;

  padding: 8px 13px;

  border-radius: 999px;

  background: rgba(255,255,255,.62);

  border: 1px solid var(--border);

  font-size: 12px;

  font-weight: 700;

  text-transform: uppercase;

  letter-spacing: .12em;

  color: var(--accent);

  margin-bottom: 1.5rem;
}

.hero h1 {
  font-family: var(--serif);

  font-size: clamp(3.8rem, 8vw, 7rem);

  line-height: .88;

  letter-spacing: -0.055em;

  margin-bottom: 1.5rem;
}

.hero h1 em {
  font-style: normal;
  color: var(--accent);
}

.hero-sub {
  font-size: 1.08rem;

  line-height: 1.8;

  color: var(--muted);

  max-width: 560px;
}

.hero-sub strong {
  color: var(--text);
}

.hero-stats {
  display: grid;
  gap: 14px;
}

.stat {
  background: var(--card);

  border: 1px solid rgba(255,255,255,.7);

  border-radius: var(--radius);

  padding: 1.4rem;

  backdrop-filter: blur(18px);

  box-shadow: 0 10px 35px rgba(0,0,0,.05);

  transition: .2s ease;
}

.stat:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}

.stat-num {
  font-family: var(--serif);

  font-size: 2.4rem;

  line-height: 1;
}

.stat-lbl {
  margin-top: 5px;

  font-size: 11px;

  text-transform: uppercase;

  letter-spacing: .08em;

  color: var(--muted);
}

/* MAIN */

.main {
  max-width: 1120px;

  margin: 0 auto;

  padding:
    0
    2rem
    5rem;
}

.section {
  display: none;
}

.section.active {
  display: block;
}

.divider {
  height: 1px;

  background:
    linear-gradient(
      90deg,
      transparent,
      var(--border2),
      transparent
    );

  margin-bottom: 2.5rem;
}

/* APP GRID */

.app-grid {
  display: grid;

  grid-template-columns:
    repeat(auto-fill,minmax(330px,1fr));

  gap: 18px;
}

.app-card {
  background: var(--card);

  border: 1px solid rgba(255,255,255,.7);

  border-radius: var(--radius);

  padding: 1.55rem;

  backdrop-filter: blur(18px);

  box-shadow:
    0 10px 30px rgba(0,0,0,.04);

  transition: .24s ease;
}

.app-card:hover {
  transform: translateY(-6px);

  box-shadow: var(--shadow);
}

.app-top {
  display: flex;

  align-items: flex-start;

  gap: 14px;

  margin-bottom: 1rem;
}

.app-icon {
  width: 58px;
  height: 58px;

  border-radius: 18px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 28px;

  flex-shrink: 0;

  border: 1px solid rgba(255,255,255,.8);
}

.app-name {
  font-family: var(--serif);

  font-size: 1.3rem;

  margin-bottom: 4px;
}

.app-cat {
  font-size: 11px;

  text-transform: uppercase;

  letter-spacing: .08em;

  color: var(--muted);
}

.app-desc {
  font-size: .92rem;

  color: var(--muted);

  line-height: 1.7;

  margin-bottom: 1.4rem;
}

.app-actions {
  display: flex;

  align-items: center;

  justify-content: space-between;

  gap: 12px;
}

.store-btn {
  display: inline-flex;

  align-items: center;

  gap: 6px;

  padding: 8px 15px;

  border-radius: 999px;

  text-decoration: none;

  font-size: 12px;

  font-weight: 700;

  color: white;

  background: var(--text);

  transition: .18s ease;
}

.store-btn:hover {
  transform: translateY(-1px);
  opacity: .92;
}

.detail-btn {
  font-size: 12px;

  color: var(--muted);

  background: none;

  border: none;

  cursor: pointer;

  transition: .15s ease;
}

.detail-btn:hover {
  color: var(--text);
}

/* DETAIL */

.detail-back {
  display: inline-flex;

  align-items: center;

  gap: 6px;

  padding: 9px 14px;

  border-radius: 999px;

  border: 1px solid var(--border);

  background: rgba(255,255,255,.55);

  color: var(--muted);

  cursor: pointer;

  margin-bottom: 2rem;

  transition: .18s ease;
}

.detail-back:hover {
  background: white;
  color: var(--text);
}

.detail-hero {
  display: flex;

  align-items: center;

  gap: 20px;

  background: var(--card);

  border: 1px solid rgba(255,255,255,.7);

  border-radius: var(--radius);

  padding: 1.5rem;

  backdrop-filter: blur(18px);

  box-shadow:
    0 10px 30px rgba(0,0,0,.04);

  margin-bottom: 2rem;
}

.detail-icon {
  width: 76px;
  height: 76px;

  border-radius: 22px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 36px;

  flex-shrink: 0;
}

.detail-name {
  font-family: var(--serif);

  font-size: 2rem;
}

.detail-cat {
  font-size: 12px;

  text-transform: uppercase;

  letter-spacing: .08em;

  color: var(--muted);

  margin-bottom: 12px;
}

/* SUBTABS */

.subtabs {
  display: flex;

  gap: 6px;

  overflow-x: auto;

  padding: 6px;

  border-radius: 999px;

  background: rgba(255,255,255,.45);

  border: 1px solid var(--border);

  margin-bottom: 2rem;
}

.subtab {
  padding: 9px 15px;

  border-radius: 999px;

  border: none;

  background: transparent;

  color: var(--muted);

  font-size: 13px;

  font-weight: 500;

  white-space: nowrap;

  cursor: pointer;

  transition: .15s ease;
}

.subtab:hover {
  color: var(--text);
}

.subtab.active {
  background: var(--text);
  color: white;
}

.subpanel {
  display: none;
}

.subpanel.active {
  display: block;
}

/* FEATURE GRID */

.feat-grid {
  display: grid;

  grid-template-columns:
    repeat(auto-fill,minmax(180px,1fr));

  gap: 14px;

  margin-bottom: 2rem;
}

.feat {
  background: var(--card);

  border: 1px solid rgba(255,255,255,.7);

  border-radius: 20px;

  padding: 1.2rem;

  backdrop-filter: blur(18px);

  box-shadow:
    0 10px 30px rgba(0,0,0,.04);
}

.feat-ico {
  font-size: 22px;
  margin-bottom: .6rem;
}

.feat h3 {
  font-size: .92rem;
  margin-bottom: .35rem;
}

.feat p {
  font-size: .82rem;
  color: var(--muted);
  line-height: 1.6;
}

/* BLOCKS */

.info-block,
.contact-card,
.privacy-intro {
  background: var(--card);

  border: 1px solid rgba(255,255,255,.7);

  border-radius: 22px;

  padding: 1.25rem 1.35rem;

  margin-bottom: 12px;

  backdrop-filter: blur(18px);

  box-shadow:
    0 10px 30px rgba(0,0,0,.04);

  line-height: 1.75;

  color: var(--muted);
}

.contact-card {
  padding: 2rem;
}

.contact-card h2 {
  font-family: var(--serif);

  font-size: 1.5rem;

  margin-bottom: .5rem;
}

.contact-link {
  display: inline-flex;

  align-items: center;

  gap: 8px;

  margin-top: 1rem;

  color: var(--accent);

  text-decoration: none;

  font-weight: 700;
}

.contact-link:hover {
  text-decoration: underline;
}

/* PRIVACY */

.privacy-section {
  background: rgba(255,255,255,.42);

  border: 1px solid var(--border);

  border-radius: 18px;

  padding: 1.1rem 1.2rem;

  margin-bottom: 1rem;
}

.privacy-section h3 {
  margin-bottom: .45rem;

  font-size: .92rem;
}

.privacy-section p,
.privacy-section ul {
  font-size: .86rem;

  color: var(--muted);

  line-height: 1.75;
}

.privacy-section ul {
  padding-left: 1.2rem;
}

.privacy-stand {
  font-size: 11px;

  text-transform: uppercase;

  letter-spacing: .08em;

  color: var(--muted);

  margin-bottom: 1.5rem;
}

/* RESPONSIVE */

@media (max-width: 850px) {

  .hero {
    grid-template-columns: 1fr;

    gap: 2.5rem;

    padding:
      4rem
      1.25rem
      3rem;
  }

  .hero h1 {
    font-size: clamp(3.5rem,18vw,5rem);
  }

  .hero-stats {
    grid-template-columns: repeat(3,1fr);
  }

  .main {
    padding:
      0
      1.25rem
      4rem;
  }

  .app-grid {
    grid-template-columns: 1fr;
  }

  .topbar {
    padding: 0 1rem;
  }

  .topbar-inner {
    flex-direction: column;

    align-items: flex-start;

    height: auto;

    gap: 12px;

    padding: 12px 0;
  }

  .topnav {
    width: 100%;
    overflow-x: auto;
  }

  .app-actions {
    flex-direction: column;
    align-items: flex-start;
  }

}

</style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">

    <span class="logo" onclick="showSection('alle')">
      <img src="3AA1EF36-C29F-4FA2-88C3-8848F25A7664.png">
      <span>Pocket Apps Studio</span>
    </span>

    <nav class="topnav">
      <button class="topnav-btn active" onclick="showSection('alle',this)">Apps</button>
      <button class="topnav-btn" onclick="showSection('support',this)">Support</button>
      <button class="topnav-btn" onclick="showSection('kontakt',this)">Kontakt</button>
      <button class="topnav-btn" onclick="showSection('datenschutz-global',this)">Datenschutz</button>
    </nav>

  </div>
</div>

<div class="hero" id="hero">

  <div>

    <div class="hero-label">
      iOS & Android · Deutschland
    </div>

    <h1>
      Kleine Apps.<br>
      <em>Große Wirkung.</em>
    </h1>

    <p class="hero-sub">
      <strong>Pocket Apps Studio</strong> entwickelt praktische,
      minimalistische Apps für echte Alltagssituationen —
      von Mietrecht und Wohnungsübergabe bis Gruppenfinanzen
      und Kneipenabend.
    </p>

  </div>

  <div class="hero-stats">

    <div class="stat">
      <div class="stat-num">6</div>
      <div class="stat-lbl">Apps im Store</div>
    </div>

    <div class="stat">
      <div class="stat-num">iOS</div>
      <div class="stat-lbl">& Android</div>
    </div>

    <div class="stat">
      <div class="stat-num">DE</div>
      <div class="stat-lbl">Hauptmarkt</div>
    </div>

  </div>

</div>

<!-- DEIN RESTLICHER HTML-CODE BLEIBT AB HIER UNVERÄNDERT -->

</body>
</html>
